name: snapshot-ticks

# Intraday price ticks. Runs every 15 min during US RTH on weekdays.
# The schedule below covers EDT and EST both.
#
# Requires repository secrets:
#   APP_URL       — e.g. https://cimg-portfolio.vercel.app (no trailing slash)
#   CRON_SECRET   — matches CRON_SECRET in the Vercel environment

on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger tick endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # --fail makes curl exit non-zero on a 4xx/5xx, which fails the job.
          # Echo the body so "green but empty DB" is self-diagnostic next time.
          response=$(curl --fail --show-error --silent \
               --max-time 60 \
               -X POST "$APP_URL/api/cron/tick" \
               -H "Authorization: Bearer $CRON_SECRET")
          echo "$response"
